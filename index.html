```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модуль калибровки: Проект ВИКА</title>
    <style>
        /* Инициализация системного интерфейса J.A.R.V.I.S. */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #050505;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            font-family: 'Courier New', Courier, monospace;
            color: #00f3ff;
            user-select: none;
        }

        /* Основной контейнер экрана */
        .monitor-display {
            position: relative;
            width: 320px; 
            height: 640px;
            background-color: #ffffff; /* Белая подложка для корректного отображения */
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1), inset 0 0 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border: 1px solid #00f3ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Декоративная сетка сканирования */
        .monitor-display::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 10;
        }

        /* Базовый слой: обесцвеченный контур */
        .layer-base {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* ИНТЕГРАЦИЯ ФАЙЛА ИЗ ВАШЕГО РЕПОЗИТОРИЯ */
            background-image: url('IMG_1167.png'); 
            background-size: cover;
            background-position: center;
            /* Превращаем цветное изображение в серый набросок */
            filter: grayscale(100%) brightness(1.1) contrast(1.1);
            z-index: 1;
        }

        /* Активный слой: оригинальное красное заполнение */
        .layer-fill {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* ИНТЕГРАЦИЯ ФАЙЛА ИЗ ВАШЕГО РЕПОЗИТОРИЯ */
            background-image: url('IMG_1167.png'); 
            background-size: cover;
            background-position: center;
            z-index: 2;
            /* Динамическое отсечение сверху. Будет меняться скриптом */
            clip-path: inset(50% 0 0 0); 
        }

        /* Терминал управления */
        .control-panel {
            margin-top: 20px;
            width: 320px;
            background: rgba(10, 10, 10, 0.8);
            padding: 20px;
            border-radius: 4px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-sizing: border-box;
            text-align: center;
            position: relative;
        }

        .status-header {
            font-size: 1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        .telemetry-value {
            font-size: 1.8rem;
            color: #ff003c;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.6);
            display: inline-block;
            min-width: 80px;
        }

        /* Стилизация ползунка */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
            position: relative;
            z-index: 2;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 12px;
            background: #00f3ff;
            cursor: pointer;
            box-shadow: 0 0 10px #00f3ff;
            margin-top: -10px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: rgba(0, 243, 255, 0.3);
        }

        .labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: bold;
            color: #555;
            letter-spacing: 2px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Дисплей визуализации объекта -->
    <div class="monitor-display">
        <div class="layer-base" id="baseLayer"></div>
        <div class="layer-fill" id="fillLayer"></div>
    </div>

    <!-- Модуль ручной калибровки -->
    <div class="control-panel">
        <div class="status-header">
            УРОВЕНЬ СОСТОЯНИЯ: <span class="telemetry-value" id="telemetryValue">50%</span>
        </div>
        <input type="range" id="calibrationSlider" min="0" max="100" value="50">
        <div class="labels">
            <span>[ BAD ]</span>
            <span>[ GOOD ]</span>
        </div>
    </div>

    <script>
        // Инициализация аппаратных прерываний
        const slider = document.getElementById('calibrationSlider');
        const fillLayer = document.getElementById('fillLayer');
        const telemetry = document.getElementById('telemetryValue');

        // Мониторинг положения ползунка в реальном времени
        slider.addEventListener('input', function() {
            const val = parseInt(this.value, 10);
            
            // Расчет смещения отсекающей маски
            const clipTop = 100 - val; 
            fillLayer.style.clipPath = `inset(${clipTop}% 0 0 0)`;
            telemetry.textContent = val + '%';
            
            // Цветовая индикация критических состояний
            if (val <= 30) {
                telemetry.style.color = '#ff003c'; // Красный (Критически низкий)
                telemetry.style.textShadow = '0 0 10px rgba(255, 0, 60, 0.6)';
            } else if (val >= 70) {
                telemetry.style.color = '#00ffcc'; // Бирюзовый (Оптимальный)
                telemetry.style.textShadow = '0 0 10px rgba(0, 255, 204, 0.6)';
            } else {
                telemetry.style.color = '#ffaa00'; // Желтый (Переходный)
                telemetry.style.textShadow = '0 0 10px rgba(255, 170, 0, 0.6)';
            }
        });
    </script>

</body>
</html>
