```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модуль калибровки: Проект ВИКА</title>
    <style>
        /* Системный интерфейс J.A.R.V.I.S. */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #050505;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            font-family: 'Courier New', Courier, monospace;
            color: #00f3ff;
            user-select: none;
        }

        /* Контейнер визуализации */
        .monitor-display {
            position: relative;
            width: 360px; 
            height: 750px; 
            background-color: #ffffff; 
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1), inset 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #00f3ff;
        }

        /* Сетка сканирования */
        .monitor-display::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 10;
        }

        /* СЛОЙ 1: Статичный оригинал (сохраняет оригинальную легенду в углу) */
        .layer-static {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_1167.png'); 
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 1;
        }

        /* СЛОЙ 2: Зеленое состояние (Добро) */
        .layer-green {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_1167.png'); 
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center bottom;
            /* Преобразуем красные штрихи в зеленые */
            filter: hue-rotate(120deg) saturate(1.5) brightness(0.95);
            z-index: 2;
            /* ГЕОМЕТРИЧЕСКИЙ ОБХОД: Вырезаем правый нижний угол, чтобы не перекрашивать легенду */
            clip-path: polygon(0% 0%, 100% 0%, 100% 82%, 75% 82%, 75% 100%, 0% 100%);
        }

        /* СЛОЙ 3: Красное состояние (Злобность) */
        .layer-red {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('IMG_1167.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 3;
            /* Управляется скриптом */
            clip-path: inset(50% 0 0 0); 
            will-change: clip-path; 
        }

        /* Панель управления (Терминал) */
        .control-panel {
            margin-top: 20px;
            width: 360px;
            background: rgba(10, 10, 10, 0.8);
            padding: 20px;
            border-radius: 4px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-sizing: border-box;
            text-align: center;
        }

        .status-header {
            font-size: 1rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            color: #aaa;
        }

        .telemetry-value {
            font-size: 1.8rem;
            color: #ffaa00;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.6);
            display: inline-block;
            min-width: 80px;
        }

        /* Стилизация ползунка */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
            position: relative;
            z-index: 2;
        }

        input[type="range"]:focus { outline: none; }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 12px;
            background: #00f3ff;
            cursor: pointer;
            box-shadow: 0 0 10px #00f3ff;
            margin-top: -10px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: rgba(0, 243, 255, 0.3);
        }

        .labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: bold;
            color: #555;
            letter-spacing: 2px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="monitor-display">
        <!-- Трёхслойная архитектура рендеринга -->
        <div class="layer-static"></div>
        <div class="layer-green"></div>
        <div class="layer-red" id="fillLayer"></div>
    </div>

    <div class="control-panel">
        <div class="status-header">
            УРОВЕНЬ ЗЛОБНОСТИ: <span class="telemetry-value" id="telemetryValue">55%</span>
        </div>
        <input type="range" id="calibrationSlider" min="0" max="100" value="55">
        <div class="labels">
            <span>[ GOOD ]</span>
            <span>[ BAD ]</span>
        </div>
    </div>

    <script>
        const slider = document.getElementById('calibrationSlider');
        const fillLayer = document.getElementById('fillLayer');
        const telemetry = document.getElementById('telemetryValue');

        // Инициализация при загрузке
        updateTelemetry(slider.value);

        slider.addEventListener('input', function() {
            updateTelemetry(this.value);
        });

        function updateTelemetry(value) {
            const val = parseInt(value, 10);
            
            // Расчет отсечения (Сняты лимиты). 
            // 100% Злобности = 0% отсечения сверху (полностью открывает слой 3 до самого верха холста).
            // 0% Злобности = 100% отсечения сверху (слой 3 полностью скрыт).
            const clipTop = 100 - val; 
            
            fillLayer.style.clipPath = `inset(${clipTop}% 0 0 0)`;
            telemetry.textContent = val + '%';
            
            // Цветовая кодировка телеметрии
            if (val <= 30) {
                telemetry.style.color = '#00ffcc'; // Зеленый
                telemetry.style.textShadow = '0 0 10px rgba(0, 255, 204, 0.6)';
            } else if (val >= 70) {
                telemetry.style.color = '#ff003c'; // Красный
                telemetry.style.textShadow = '0 0 10px rgba(255, 0, 60, 0.6)';
            } else {
                telemetry.style.color = '#ffaa00'; // Желтый
                telemetry.style.textShadow = '0 0 10px rgba(255, 170, 0, 0.6)';
            }
        }
    </script>

</body>
</html>
